services:
  denova:
    build:
      context: .
      args:
        DENOVA_VERSION: ${DENOVA_VERSION:-docker}
    image: denova:local
    restart: unless-stopped
    ports:
      - "${DENOVA_HOST_PORT:-8080}:8080"
    environment:
      DENOVA_BACKEND_PORT: "8080"
      DENOVA_DIR: /data/.denova
      DENOVA_SKILLS_DIR: /app/skills
      DENOVA_WEB_DIR: /app/web
      DENOVA_ALLOW_LAN_ACCESS: "true"
      DENOVA_REMOTE_ACCESS_USERNAME: ${DENOVA_REMOTE_ACCESS_USERNAME:?set DENOVA_REMOTE_ACCESS_USERNAME in .env}
      DENOVA_REMOTE_ACCESS_PASSWORD: ${DENOVA_REMOTE_ACCESS_PASSWORD:?set DENOVA_REMOTE_ACCESS_PASSWORD in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_IMAGE_API_KEY: ${OPENAI_IMAGE_API_KEY:-}
      OPENAI_IMAGE_BASE_URL: ${OPENAI_IMAGE_BASE_URL:-}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-}
    volumes:
      - denova-data:/data

volumes:
  denova-data:
